# wrangler.toml
#
# 重要: wrangler の仕様上、[env.X] ブロックを定義すると top-level の
# [[kv_namespaces]] / [vars] は **その env には継承されない**。
# よって dev / prod それぞれにフルセットを明示する。
# KV ネームスペース ID は dev/prod 共有（レート制限は端末 ID キーなので衝突なし）。

name = "kore-dou-suteru-api"
main = "src/index.ts"
compatibility_date = "2026-05-12"
compatibility_flags = ["nodejs_compat"]

# ─────────────────────────────────────────────
# 本番環境
# ─────────────────────────────────────────────
[env.production]
name = "kore-dou-suteru-api-production"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT"
id = "77ad0d59ada24cd08a4d3ea65b7d58af"

[env.production.vars]
GEMINI_MODEL = "gemini-2.5-flash"
ALLOWED_ORIGINS = "*"
RATE_LIMIT_PER_MINUTE = "10"

# ─────────────────────────────────────────────
# 開発環境
# ─────────────────────────────────────────────
[env.development]
name = "kore-dou-suteru-api-dev"

[[env.development.kv_namespaces]]
binding = "RATE_LIMIT"
id = "77ad0d59ada24cd08a4d3ea65b7d58af"

[env.development.vars]
GEMINI_MODEL = "gemini-2.5-flash"
ALLOWED_ORIGINS = "*"
RATE_LIMIT_PER_MINUTE = "10"
